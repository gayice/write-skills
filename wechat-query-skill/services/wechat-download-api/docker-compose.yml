# WeChat Download API - Docker Compose
# Usage: docker-compose up -d
#
# First time setup:
#   1. Copy env.example to .env: cp env.example .env
#   2. Edit .env and set SITE_URL to your actual URL
#   3. Run: docker-compose up -d
#   4. Visit http://localhost:5000/login.html to scan QR code

services:
  wechat-api:
    # image: tmwgsicp/wechat-download-api:latest
    # Build locally to use latest code:
    build:
      context: .
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    container_name: wechat-download-api
    # Run as root in this deployment to avoid bind-mount SQLite permission issues
    # on first startup. This makes initial deployment more reliable for agents.
    user: "0:0"
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Config file (writable - login saves credentials here)
      - ./.env:/app/.env
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
